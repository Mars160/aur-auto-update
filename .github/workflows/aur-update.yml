name: Update AUR packages

on:
  schedule:
    - cron: '17 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/aur-update.yml'
      - 'config/**'
      - 'packages/**'
      - 'scripts/**'

permissions:
  contents: write

concurrency:
  group: aur-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    container: archlinux:base-devel

    steps:
      - name: Install tools
        run: pacman -Sy --noconfirm --needed git openssh curl ca-certificates rsync

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        shell: bash
        run: |
          set -euo pipefail
          source config/VARS.sh
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global user.name "$NAME"
          git config --global user.email "$EMAIL"
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Check package updates
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: runuser -u builder -- env GITHUB_TOKEN="${GITHUB_TOKEN}" scripts/update-all.sh

      - name: Detect changes
        id: changes
        shell: bash
        run: |
          set -euo pipefail
          packages=$(scripts/push-aur.sh --list)
          if [[ -z "$packages" ]]; then
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
            echo "no packages need AUR push"
          else
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
            echo "packages needing AUR push:"
            printf '%s\n' "$packages"
          fi

      - name: Configure AUR SSH
        if: steps.changes.outputs.has_updates == 'true'
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          test -n "$AUR_SSH_PRIVATE_KEY"
          ssh_dir="${HOME}/.ssh"
          install -d -m 700 "$ssh_dir"
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > "${ssh_dir}/aur"
          chmod 600 "${ssh_dir}/aur"
          ssh-keyscan -T 30 -t rsa,ecdsa,ed25519 aur.archlinux.org > "${ssh_dir}/known_hosts"
          test -s "${ssh_dir}/known_hosts"
          chmod 600 "${ssh_dir}/known_hosts"
          cat > "${ssh_dir}/config" <<EOF
          Host aur.archlinux.org
            HostName aur.archlinux.org
            User aur
            IdentityFile ${ssh_dir}/aur
            UserKnownHostsFile ${ssh_dir}/known_hosts
            IdentitiesOnly yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 "${ssh_dir}/config"
          echo "GIT_SSH_COMMAND=ssh -F ${ssh_dir}/config -o BatchMode=yes" >> "$GITHUB_ENV"
          ssh -F "${ssh_dir}/config" -o BatchMode=yes -T aur.archlinux.org || {
            status=$?
            if [[ "$status" -ne 1 ]]; then
              exit "$status"
            fi
          }

      - name: Push updated packages to AUR
        if: steps.changes.outputs.has_updates == 'true'
        shell: bash
        run: scripts/push-aur.sh

      - name: Commit updated package files
        if: steps.changes.outputs.has_updates == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- packages)" ]]; then
            echo "no package files changed"
          else
            git add packages
            git commit -m "chore: update AUR packages"
            git push
          fi
